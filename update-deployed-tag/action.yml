name: Update deployed tag
description: Update deployed tag
inputs:
  token:
    description: Token to use to run workflow
    required: true
  app:
    descrption: App to update
    required: true
  environment:
    descrption: Environment to update
    required: true
  base-tag:
    description: Base tag
    required: true
  tag:
    description: Tag to update to
    required: true

runs:
  using: "composite"
  steps:
    - name: Update deployed image
      uses: actions/github-script@v9
      id: dispatch
      with:
        github-token: ${{ inputs.token }}
        script: |
          const workflow = await github.actions.createWorkflowDispatch({
              owner: "metacpan",
              repo: "metacpan-k8s",
              workflow_id: "set-image.yml",
              ref: "main",
              inputs: {
                "app": "${{ inputs.app }}",
                "environment": "${{ inputs.environment }}",
                "base-tag": "${{ inputs.base-tag }}",
                "tag": "${{ inputs.tag }}"
              }
          });
