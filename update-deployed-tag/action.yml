name: Update deployed tag
description: Update deployed tag
inputs:
  token:
    description: Token to use to run workflow
    required: true
  app:
    descrption: App to update
    required: true
  environment:
    descrption: Environment to update
    required: true
  base-tag:
    description: Base tag
    required: true
  tag:
    description: Tag to update to
    required: true

runs:
  using: "composite"
  steps:
    - name: Update deployed image
      uses: actions/github-script@v9
      id: dispatch
      env:
        APP: ${{ inputs.app }}
        ENVIRONMENT: ${{ inputs.environment }}
        BASE_TAG: ${{ inputs.base-tag }}
        TAG: ${{ inputs.tag }}
      with:
        github-token: ${{ inputs.token }}
        script: |
          const { APP, ENVIRONMENT, BASE_TAG, TAG } = process.env;
          const workflow = await github.rest.actions.createWorkflowDispatch({
              owner: "metacpan",
              repo: "metacpan-k8s",
              workflow_id: "set-image.yml",
              ref: "main",
              inputs: {
                "app": APP,
                "environment": ENVIRONMENT,
                "base-tag": BASE_TAG,
                "tag": TAG,
              },
          });
          console.log(workflow);
